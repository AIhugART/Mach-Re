name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - '*.css'
      - '*.js'
      - '*.png'
      - '*.ico'
      - '*.svg'
      - 'publish/**/*.html'
      - 'publish/**/*.css'
      - 'publish/**/*.js'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            *.html
            *.css
            *.js
            *.png
            *.ico
            *.svg
            LICENSE
            publish/
            papers/
          sparse-checkout-cone-mode: false

      - name: Remove non-site files
        run: |
          # Keep only files needed for the website
          # Remove any directories that leaked through sparse checkout
          rm -rf documents/ archives/ raw/ scratch/ review/ plan/ .claude/ .gitnexus/ .tmp.drivedownload/ .tmp.driveupload/ 2>/dev/null || true
          rm -f *.py *.md *.workspace *.txt 2>/dev/null || true
          echo "=== Files to deploy ==="
          find . -not -path './.git/*' -not -path './.github/*' -not -name '.git' -not -name '.github' -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
